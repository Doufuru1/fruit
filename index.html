<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐸 Frog Meme | 青蛙表情包乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --secondary: #84cc16;
            --accent: #fbbf24;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --water: #0ea5e9;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Animated background - water ripples */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 10% 20%, rgba(34, 197, 94, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(132, 204, 22, 0.05) 0%, transparent 70%);
        }

        .floating-lilies {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .lily {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.08;
            animation: floatLily 20s infinite ease-in-out;
        }

        @keyframes floatLily {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.08; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.15; }
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-logo-icon {
            font-size: 2rem;
            animation: ribbit 3s ease-in-out infinite;
        }

        @keyframes ribbit {
            0%, 90%, 100% { transform: scale(1); }
            95% { transform: scale(1.2); }
        }

        .wallet-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f6851b 0%, #e2761b 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(246, 133, 27, 0.3);
        }

        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(246, 133, 27, 0.4);
        }

        .wallet-btn.connected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .wallet-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 80px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 3000;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            font-size: 1.5rem;
        }

        .toast-content {
            display: flex;
            flex-direction: column;
        }

        .toast-title {
            font-weight: 700;
            color: var(--text-light);
        }

        .toast-message {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .toast.success {
            border-left: 4px solid var(--primary);
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* Header */
        header {
            text-align: center;
            padding: 120px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 5rem;
            animation: jump 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(34, 197, 94, 0.5));
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 30px;
            margin: 30px auto;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
        }

        /* Meme grid */
        .meme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .meme-card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .meme-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .meme-card:hover::before {
            opacity: 1;
        }

        .meme-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(34, 197, 94, 0.2);
        }

        .meme-img-wrapper {
            position: relative;
            overflow: hidden;
            height: 300px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .meme-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .meme-card:hover .meme-img {
            transform: scale(1.1);
        }

        .meme-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(30, 41, 59, 0.95) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .meme-card:hover .meme-overlay {
            opacity: 1;
        }

        .view-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .meme-content {
            padding: 24px;
        }

        .meme-tag {
            display: inline-block;
            background: rgba(34, 197, 94, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .meme-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .meme-desc {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Reaction buttons */
        .reaction-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .reaction-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .reaction-btn.active {
            background: var(--primary);
            color: white;
        }

        .counter {
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* Floating add button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 15px 40px rgba(34, 197, 94, 0.5);
        }

        .fab-tooltip {
            position: absolute;
            right: 80px;
            background: var(--bg-card);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .fab:hover .fab-tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .modal-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        footer p {
            margin: 8px 0;
        }

        .heart {
            color: var(--primary);
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 3000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 15px;
            }

            .nav-logo span:last-child {
                display: none;
            }

            .wallet-btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }

            h1 {
                font-size: 2.5rem;
            }
            
            .logo-icon {
                font-size: 3.5rem;
            }
            
            header {
                padding-top: 100px;
            }

            .stats-bar {
                gap: 30px;
                padding: 20px;
            }

            .stat-number {
                font-size: 2rem;
            }
            
            .meme-grid {
                grid-template-columns: 1fr;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="floating-lilies">
        <span class="lily" style="top: 15%; left: 8%;">🪷</span>
        <span class="lily" style="top: 35%; right: 12%; animation-delay: 3s;">🌿</span>
        <span class="lily" style="top: 65%; left: 5%; animation-delay: 6s;">🍃</span>
        <span class="lily" style="bottom: 25%; right: 10%; animation-delay: 9s;">🪷</span>
        <span class="lily" style="top: 85%; left: 15%; animation-delay: 12s;">🌱</span>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <span class="nav-logo-icon">🐸</span>
            <span>Frog Meme</span>
        </div>
        <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">
            <span class="wallet-icon">🦊</span>
            <span id="walletText">连接钱包</span>
        </button>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✅</span>
        <div class="toast-content">
            <span class="toast-title" id="toastTitle">成功</span>
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <header>
        <div class="logo">
            <span class="logo-icon">🐸</span>
            <h1>Frog Meme</h1>
        </div>
        <p class="subtitle">治愈系青蛙表情包，让每一天都充满活力 🌿</p>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalMemes">6</div>
                <div class="stat-label">表情包</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">总点赞</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">快乐值</div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="cute">萌蛙</button>
            <button class="filter-btn" data-filter="funny">搞笑</button>
            <button class="filter-btn" data-filter="relatable">共鸣</button>
        </div>
    </header>

    <div class="meme-grid" id="memeGrid"></div>

    <footer>
        <p>Made with <span class="heart">💚</span> for frog lovers everywhere</p>
        <p style="font-size: 0.85rem; margin-top: 10px;">© 2026 Frog Meme · 呱呱呱 🐸</p>
    </footer>

    <button class="fab" onclick="addRandomMeme()">
        +
        <span class="fab-tooltip">添加随机表情包</span>
    </button>

    <div class="modal" id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img class="modal-img" id="modalImg" src="" alt="Frog Meme">
        </div>
    </div>

    <script>
        // Wallet Connection
        let walletAddress = null;

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                showToast('error', '未检测到 MetaMask', '请先安装 MetaMask 钱包');
                setTimeout(() => window.open('https://metamask.io/download/', '_blank'), 2000);
                return;
            }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length > 0) {
                    walletAddress = accounts[0];
                    updateWalletUI();
                    showToast('success', '钱包已连接', formatAddress(walletAddress));
                }
            } catch (error) {
                if (error.code === 4001) {
                    showToast('error', '连接取消', '您拒绝了连接请求');
                } else {
                    showToast('error', '连接失败', error.message);
                }
            }
        }

        function updateWalletUI() {
            const btn = document.getElementById('walletBtn');
            const text = document.getElementById('walletText');
            if (walletAddress) {
                btn.classList.add('connected');
                text.textContent = formatAddress(walletAddress);
            }
        }

        function formatAddress(addr) {
            return addr.slice(0, 6) + '...' + addr.slice(-4);
        }

        function showToast(type, title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Check existing connection
        async function checkWallet() {
            if (typeof window.ethereum !== 'undefined') {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    walletAddress = accounts[0];
                    updateWalletUI();
                }
                window.ethereum.on('accountsChanged', (acc) => {
                    if (acc.length === 0) {
                        walletAddress = null;
                        document.getElementById('walletBtn').classList.remove('connected');
                        document.getElementById('walletText').textContent = '连接钱包';
                    } else {
                        walletAddress = acc[0];
                        updateWalletUI();
                    }
                });
            }
        }

        // Frog Memes Data
        const frogMemes = [
            { id: 1, url: 'https://loremflickr.com/600/450/frog?lock=1', title: '周一早晨的我', desc: '又要去搬砖了，呱呱...', tag: 'relatable', tagName: '共鸣' },
            { id: 2, url: 'https://loremflickr.com/600/450/frog?lock=2', title: '等待发工资', desc: '这个月的虫子还没到账', tag: 'funny', tagName: '搞笑' },
            { id: 3, url: 'https://loremflickr.com/600/450/frog?lock=3', title: '周末睡懒觉', desc: '睡到自然醒，没有闹钟', tag: 'cute', tagName: '萌蛙' },
            { id: 4, url: 'https://loremflickr.com/600/450/frog?lock=4', title: '听到下班铃声', desc: '冲刺！第一个冲出办公室', tag: 'funny', tagName: '搞笑' },
            { id: 5, url: 'https://loremflickr.com/600/450/frog?lock=5', title: '被老板点名', desc: '完犊子了，我啥也没干啊', tag: 'relatable', tagName: '共鸣' },
            { id: 6, url: 'https://loremflickr.com/600/450/frog?lock=6', title: '摸鱼被发现', desc: '我只是在水草里思考人生', tag: 'cute', tagName: '萌蛙' }
        ];

        let reactions = {};
        let currentFilter = 'all';

        function renderMemes() {
            const grid = document.getElementById('memeGrid');
            const filtered = currentFilter === 'all' ? frogMemes : frogMemes.filter(m => m.tag === currentFilter);

            grid.innerHTML = filtered.map((meme, i) => `
                <div class="meme-card" style="animation: fadeIn 0.5s ease ${i * 0.1}s both;">
                    <div class="meme-img-wrapper" onclick="openModal('${meme.url}')">
                        <img class="meme-img" src="${meme.url}" alt="${meme.title}" loading="lazy">
                        <div class="meme-overlay">
                            <button class="view-btn">🔍 查看大图</button>
                        </div>
                    </div>
                    <div class="meme-content">
                        <span class="meme-tag">${meme.tagName}</span>
                        <h3 class="meme-title">${meme.title}</h3>
                        <p class="meme-desc">${meme.desc}</p>
                        <div class="reaction-bar">
                            <button class="reaction-btn ${reactions[`${meme.id}-like`] ? 'active' : ''}" onclick="event.stopPropagation(); toggleReaction(${meme.id}, 'like')">
                                💚 <span class="counter" id="like-${meme.id}">${reactions[`${meme.id}-like`] || 0}</span>
                            </button>
                            <button class="reaction-btn ${reactions[`${meme.id}-laugh`] ? 'active' : ''}" onclick="event.stopPropagation(); toggleReaction(${meme.id}, 'laugh')">
                                😂 <span class="counter" id="laugh-${meme.id}">${reactions[`${meme.id}-laugh`] || 0}</span>
                            </button>
                            <button class="reaction-btn ${reactions[`${meme.id}-cool`] ? 'active' : ''}" onclick="event.stopPropagation(); toggleReaction(${meme.id}, 'cool')">
                                😎 <span class="counter" id="cool-${meme.id}">${reactions[`${meme.id}-cool`] || 0}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('totalMemes').textContent = frogMemes.length;
            document.getElementById('totalLikes').textContent = Object.values(reactions).reduce((a,b) => a+b, 0);
        }

        function toggleReaction(id, type) {
            const key = `${id}-${type}`;
            reactions[key] = (reactions[key] || 0) + 1;
            document.getElementById(`${type}-${id}`).textContent = reactions[key];
            event.target.closest('.reaction-btn').classList.add('active');
            createConfetti(event.clientX, event.clientY);
            document.getElementById('totalLikes').textContent = Object.values(reactions).reduce((a,b) => a+b, 0);
        }

        function createConfetti(x, y) {
            const colors = ['#22c55e', '#84cc16', '#fbbf24', '#0ea5e9'];
            for (let i = 0; i < 6; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.cssText = `left:${x}px;top:${y}px;width:10px;height:10px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:50%`;
                document.body.appendChild(el);
                const angle = (Math.PI * 2 * i) / 6;
                const vx = Math.cos(angle) * 100;
                const vy = Math.sin(angle) * 100 - 50;
                el.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${vx}px,${vy+200}px) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = () => el.remove();
            }
        }

        function openModal(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function addRandomMeme() {
            const templates = [
                { title: '雨后出街', desc: '空气真好，去池塘边走走', tag: 'cute', tagName: '萌蛙' },
                { title: '老板画饼', desc: '这饼画得比荷叶还大', tag: 'funny', tagName: '搞笑' },
                { title: '加班夜', desc: '月亮都睡了，我还在改BUG', tag: 'relatable', tagName: '共鸣' },
                { title: ' vacation', desc: '终于休假了！呱呱！', tag: 'cute', tagName: '萌蛙' }
            ];
            const t = templates[Math.floor(Math.random() * templates.length)];
            frogMemes.unshift({
                id: Date.now(),
                url: `https://loremflickr.com/600/450/frog?lock=${Date.now()}`,
                title: t.title, desc: t.desc, tag: t.tag, tagName: t.tagName
            });
            renderMemes();
            document.querySelector('.meme-grid').scrollIntoView({ behavior: 'smooth' });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMemes();
            });
        });

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        document.addEventListener('DOMContentLoaded', () => {
            checkWallet();
            renderMemes();
        });
    </script>
</body>
</html>
